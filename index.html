<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Política de Privacidad · Ripple</title>
<style>
  :root{
    --green:#22C55E; --green-d:#16A34A; --bio:#00E5A0;
    --ocean:#060E1A; --ink:#111827; --muted:#64748B; --line:#E5EAF2;
    --bg:#F8FAFF; --card:#FFFFFF; --amber:#F59E0B;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.65; font-size:17px;
  }
  a{color:var(--green-d); text-decoration:none; font-weight:600}
  a:hover{text-decoration:underline}

  /* Header */
  .hero{
    background:linear-gradient(135deg,var(--ocean) 0%,#0B2138 55%,#0E3A4A 100%);
    color:#fff; padding:56px 22px 64px; text-align:center; position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:48px;
    background:radial-gradient(120% 100% at 50% 0%, rgba(0,229,160,.25), transparent 70%);
  }
  .brand{
    display:inline-flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.5px;
    font-size:15px; text-transform:uppercase; color:var(--bio); margin-bottom:18px;
  }
  .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--bio);box-shadow:0 0 16px var(--bio)}
  .hero h1{margin:0; font-size:30px; line-height:1.2; font-weight:800}
  .hero .upd{margin:14px 0 0; color:#9FB3C8; font-size:14px}

  /* Language switcher */
  .langs{
    display:inline-flex; gap:6px; margin-bottom:22px; background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:4px;
  }
  .langs button{
    appearance:none; border:0; background:transparent; color:#9FB3C8; cursor:pointer;
    font-weight:700; font-size:13px; letter-spacing:.5px; padding:6px 14px; border-radius:999px;
    transition:background .15s, color .15s;
  }
  .langs button.active{background:var(--green); color:#04130c}
  .langs button:hover:not(.active){color:#fff}

  /* Layout */
  .wrap{max-width:760px; margin:-32px auto 0; padding:0 18px 80px; position:relative; z-index:1}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:24px 22px; margin:18px 0; box-shadow:0 8px 30px rgba(16,32,56,.06);
  }
  .intro{font-size:17px; color:#334155}
  h2{
    font-size:21px; font-weight:800; margin:34px 0 12px; color:var(--ink);
    display:flex; align-items:center; gap:10px;
  }
  h2::before{content:""; width:6px; height:22px; border-radius:4px; background:var(--green); display:inline-block}
  h3{font-size:16px; font-weight:700; margin:18px 0 6px; color:var(--ink)}
  p{margin:10px 0}
  .muted{color:var(--muted)}

  /* Summary checklist */
  .check{list-style:none; padding:0; margin:8px 0}
  .check li{position:relative; padding:8px 0 8px 34px; border-bottom:1px solid var(--line)}
  .check li:last-child{border-bottom:0}
  .check li::before{
    content:"\2713"; position:absolute; left:0; top:7px; width:22px; height:22px;
    background:rgba(34,197,94,.12); color:var(--green-d); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;
  }
  /* Negative list */
  ul.dash{list-style:none; padding:0; margin:8px 0}
  ul.dash li{position:relative; padding:6px 0 6px 26px}
  ul.dash li::before{content:"\2013"; position:absolute; left:6px; color:var(--muted); font-weight:700}
  ul.plain{padding-left:22px} ul.plain li{margin:6px 0}

  /* Table */
  .tablewrap{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:10px 0; border-radius:14px; border:1px solid var(--line)}
  table{border-collapse:collapse; width:100%; min-width:520px; font-size:15px}
  th,td{text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); vertical-align:top}
  th{background:#F1F5F9; font-weight:700; color:#334155; font-size:13px; text-transform:uppercase; letter-spacing:.4px}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px}
  .yes{background:rgba(34,197,94,.12); color:var(--green-d)}
  .no{background:rgba(100,116,139,.12); color:var(--muted)}

  .contact{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(0,229,160,.06)); border-color:rgba(34,197,94,.25)}
  .mail{font-weight:700; font-size:17px}

  footer{text-align:center; color:var(--muted); font-size:13px; padding:30px 18px 50px}
  footer .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:7px;vertical-align:middle}

  @media (max-width:520px){
    .hero{padding:44px 18px 56px} .hero h1{font-size:25px}
    body{font-size:16px} .card{padding:20px 18px}
  }
</style>
</head>

function pickLang() {
  const saved = localStorage.getItem("ripple_policy_lang");
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || "es").slice(0,2).toLowerCase();
  return I18N[nav] ? nav : "es";
}

function render(lang) {
  const d = I18N[lang] || I18N.es;
  document.documentElement.lang = d.htmlLang;
  document.title = d.docTitle;
  document.getElementById("title").textContent = d.title;
  document.getElementById("updated").textContent = d.updated;
  document.getElementById("footer").textContent = d.footer;
  document.getElementById("content").innerHTML = d.content;
  document.querySelectorAll("#langs button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  localStorage.setItem("ripple_policy_lang", lang);
}

document.querySelectorAll("#langs button").forEach(b => {
  b.addEventListener("click", () => render(b.dataset.lang));
});

render(pickLang());
